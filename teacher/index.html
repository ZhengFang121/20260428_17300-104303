<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國家公園介紹網</title>
  <style>
    #main {
      width: 1024px;
      height: 768px;
      margin: auto;
      /* border: 1px solid #000; */
    }

    #top {
      width: 1000px;
      height: 65px;
      margin: auto;
      background: #00f;
      text-align: center;
    }

    #left {
      width: 200px;
      height: calc(768px - 65px - 20px);
      float: left;
      margin-left: 12px;
      background: #00FFFF;
    }

    .menu {
      width: 100%;
      text-align: center;
    }

    .menu img {
      width: 120px;
      height: 40px;
    }

    .menu img:hover {
      filter: hue-rotate(120deg);
    }

    .a {
      height: 30px;
    }

    .download {
      text-align: center;
    }

    #right {
      width: 800px;
      height: calc(768px - 65px - 20px);
      float: right;
      margin-right: 12px;
      /* background: lightcyan; */
    }

    marquee {
      width: 800px;
      height: 29px;
      /* 可以處理掉 marquee 下方產生的空白，會讓 right 變高一點 */
      vertical-align: middle;
    }

    iframe {
      width: 800px;
      /* right 的高度扣掉 marquee 的高度 */
      height: calc(768px - 65px - 20px - 29px);
    }

    #footer {
      width: 1000px;
      height: 20px;
      margin: auto;
      clear: both;
      font-size: 16px;
      text-align: center;
      font-family: "標楷體";
      /* background: lawngreen; */
    }
  </style>
</head>

<body>
  <div id="main">
    <div id="top"><a href="./index.html"><img src="./images/park0307.gif"></a></div>
    <div id="left">
      <!-- table.menu>tr*7>td -->
      <table class="menu">
        <tr>
          <td>
            <a href="./park/yangmingshan.html" target="iframe">
              <img src="./images/park0302.jpg" alt="陽明山國家公園" title="陽明山國家公園">
            </a>
          </td>
        </tr>
        <tr>
          <td class="a"></td>
        </tr>
        <tr>
          <td>
            <a href="./park/sheipa.html" target="iframe">
              <img src="./images/park0303.jpg" alt="雪霸國家公園" title="雪霸國家公園">
            </a>
          </td>
        </tr>
        <tr>
          <td class="a"></td>
        </tr>
        <tr>
          <td><img src="./images/park0304.jpg" alt="太魯閣國家公園" title="太魯閣國家公園"></td>
        </tr>
        <tr>
          <td class="a"></td>
        </tr>
        <tr>
          <td><img src="./images/park0305.jpg" alt="玉山國家公園" title="玉山國家公園"></td>
        </tr>
      </table>
      <!-- 加上 download 屬性才能下載 -->
      <p class="download"><a href="./others/park.mp3" download>檔案下載</a></p>
    </div>
    <div id="right">
      <marquee>歡迎進入國家公園介紹網，本網站有詳細的國家公園介紹哦！</marquee>
      <iframe src="./others/main.html" frameborder="0" name="iframe"></iframe>
    </div>
    <div id="footer">網頁設計及維護：00張凱富、最近更新日期：2026/05/26</div>
  </div>
</body>

</html>
